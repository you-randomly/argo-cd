kind: Namespace
apiVersion: v1
metadata:
  name: tempo
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  destination:
    namespace: tempo
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: tempo
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 1.7.0
    helm:
      valuesObject:
        tempo:
          retention: 72h
          config:
            storage:
              trace:
                backend: local
                local:
                  path: /var/tempo/traces
            receivers:
              otlp:
                protocols:
                  grpc:
                    endpoint: 0.0.0.0:4317
                  http:
                    endpoint: 0.0.0.0:4318
        persistence:
          enabled: true
          size: 10Gi
          storageClassName: longhorn-talos
        serviceAccount:
          create: true
        rbac:
          pspEnabled: false
        service:
          type: ClusterIP
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
