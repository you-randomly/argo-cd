kind: Namespace
apiVersion: v1
metadata:
  name: kube-prometheus-stack
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/warn-version: latest
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  destination:
    namespace: kube-prometheus-stack
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 65.1.1
    helm:
      valuesObject:
        prometheus:
          prometheusSpec:
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn-talos
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 10Gi
        grafana:
          sidecar:
            datasources:
              enabled: true
              url: http://kube-prometheus-stack-prometheus.kube-prometheus-stack.svc.cluster.local:9090/
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.loki.svc.cluster.local:3100
              access: proxy
              isDefault: false
              jsonData:
                # Wire up trace IDs in logs to Tempo trace links when Tempo is added.
                # The uid must match the Tempo datasource uid once configured.
                derivedFields:
                  - name: TraceID
                    matcherRegex: '"traceid":"(\w+)"'
                    url: "$${__value.raw}"

  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
---
kind: HTTPRoute
apiVersion: gateway.networking.k8s.io/v1beta1
metadata:
  name: ui-kube-prometheus-stack
  namespace: kube-prometheus-stack
spec:
  hostnames:
    - grafana.lab.jake-watson.co.uk
  parentRefs:
  - name: cilium-gateway
    namespace: default
  rules:
  - backendRefs:
         - name: kube-prometheus-stack-grafana
           port: 80