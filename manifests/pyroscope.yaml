kind: Namespace
apiVersion: v1
metadata:
  name: pyroscope
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/warn-version: latest
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pyroscope
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  destination:
    namespace: pyroscope
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: pyroscope
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 1.20.3
    helm:
      valuesObject:
        pyroscope:
          replicaCount: 1
          persistence:
            enabled: true
            storageClassName: longhorn-talos
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          extraArgs:
            log.level: warn
        # Use the bundled Alloy for profile scraping
        alloy:
          enabled: true
          controller:
            replicas: 1
        # Disable minio - use filesystem storage for single-binary
        minio:
          enabled: false
        serviceMonitor:
          enabled: true
          labels:
            release: kube-prometheus-stack
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 20
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 10m
    syncOptions:
      - ServerSideApply=true
